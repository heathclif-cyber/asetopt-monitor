# AsetOpt Monitor — self-host (Docker Desktop di Windows disarankan)
# Panduan lengkap: DEPLOY_SELFHOST.md
#
# PowerShell (root repo):
#   copy .env.selfhost.example .env.selfhost
#   # edit .env.selfhost
#   .\scripts\selfhost.ps1 up

name: asetopt-monitor

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-asetopt}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-asetopt_change_me}
      POSTGRES_DB: ${POSTGRES_DB:-asetopt}
    volumes:
      - asetopt_pgdata:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    restart: unless-stopped
    env_file:
      - .env.selfhost
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-asetopt}:${POSTGRES_PASSWORD:-asetopt_change_me}@db:5432/${POSTGRES_DB:-asetopt}
      PORT: "8000"
      UPLOAD_DIR: /app/uploads
      SUPERMAN_STATE_PATH: /app/data/.superman_state.json
      SUPERMAN_HEADLESS: "true"
      MIGRATIONS_DIR: /supabase/migrations
    volumes:
      - asetopt_uploads:/app/uploads
      - asetopt_superman:/app/data
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)",
        ]
      interval: 15s
      timeout: 8s
      retries: 8
      start_period: 45s

  # One-shot schema migration
  #   docker compose --env-file .env.selfhost --profile tools run --rm migrate
  migrate:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    env_file:
      - .env.selfhost
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-asetopt}:${POSTGRES_PASSWORD:-asetopt_change_me}@db:5432/${POSTGRES_DB:-asetopt}
      MIGRATIONS_DIR: /supabase/migrations
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - tools
    entrypoint: ["python", "_migrate.py"]

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    restart: unless-stopped
    environment:
      PORT: "3001"
      API_PROXY_URL: http://api:8000
    ports:
      - "${WEB_PORT:-3001}:3001"
    depends_on:
      api:
        condition: service_healthy

volumes:
  asetopt_pgdata:
  asetopt_uploads:
  asetopt_superman:
